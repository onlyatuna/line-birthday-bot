services:
  line-birthday-bot:
    image: ${IMAGE_TAG:-ghcr.io/onlyatuna/line-birthday-bot:latest}
    container_name: line-birthday-bot
    restart: always
    ports:
      - "8081:8080" # 映射容器內的 8080 到宿主機的 8081
    environment:
      - LINE_CHANNEL_TOKEN
      - LINE_CHANNEL_SECRET
      - ADMIN_LINE_ID
      - GROUP_LINE_ID
      - PORT=8080
      - CRON_SCHEDULE
      - EXCEL_PATH=data/birthdays.xlsx
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
